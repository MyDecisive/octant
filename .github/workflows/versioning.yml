# https://github.com/anothrNick/github-tag-action#bumping
# Controlling the patch, minor, major version bump can be done manually with a special tag in your merge commit message.
name: Bump semantic version
on:
  push:
    paths-ignore:
      - '.devcontainer/**'
      - '.github/**'
      - '.**.yml'
      - '**.md'
      - '.gitignore'
      - 'Makefile'
    branches:
      - main
  repository_dispatch:
    types: [build-and-publish]

jobs:
  gh-tag:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump_version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: '0'  # 0 is needed to get all tags
      - name: Bump version and push tag
        id: bump_version
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_PREFIX: v
          DEFAULT_BUMP: patch # Options: major, minor, patch, none

  docker-tag:
    needs: gh-tag
    if: needs.gh-tag.outputs.new_tag != ''
    uses: MyDecisive/ci/.github/workflows/docker-ghcr.yaml@main
    with:
      ref: refs/tags/${{ needs.gh-tag.outputs.new_tag }}
    secrets: inherit # pass all secrets
  helm-publish:
    needs: [gh-tag, docker-tag]
    if: needs.gh-tag.outputs.new_tag != ''
    uses: MyDecisive/ci/.github/workflows/helm-publish.yml@main
    with:
      ref: refs/tags/${{ needs.gh-tag.outputs.new_tag }}
    secrets: inherit # pass all secrets
