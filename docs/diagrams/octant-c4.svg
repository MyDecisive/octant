<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Octant Runtime Container View</title>
  <desc id="desc">Octant UI and API run in the same Kubernetes cluster as SmartHub. Octant configures SmartHub, SmartHub manages telemetry collectors and validation, and external systems provide deployment control and telemetry destinations.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <filter id="shadow" x="-8%" y="-8%" width="125%" height="125%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font: 700 32px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .boundary-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .boundary-note { font: 13px Arial, sans-serif; fill: #475569; }
      .label { font: 700 17px Arial, sans-serif; fill: #ffffff; }
      .small { font: 13px Arial, sans-serif; fill: #ffffff; }
      .dark-label { font: 700 16px Arial, sans-serif; fill: #0f172a; }
      .dark-small { font: 13px Arial, sans-serif; fill: #334155; }
      .edge { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .edge-label { font: 12px Arial, sans-serif; fill: #334155; paint-order: stroke; stroke: #f8fafc; stroke-width: 4; }
      .muted-box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#f8fafc"/>
  <text class="title" x="54" y="56">Octant Runtime Container View</text>
  <text class="subtitle" x="54" y="84">A customer operates Octant; Octant configures SmartHub; SmartHub runs the telemetry platform inside Kubernetes.</text>

  <rect x="230" y="115" width="910" height="650" rx="22" fill="#f1f5f9" stroke="#64748b" stroke-width="2.2" stroke-dasharray="10 8"/>
  <text class="boundary-title" x="685" y="150" text-anchor="middle">Kubernetes cluster</text>
  <text class="boundary-note" x="685" y="174" text-anchor="middle">Octant, SmartHub, collectors, validation jobs, metrics, insight storage,</text>
  <text class="boundary-note" x="685" y="192" text-anchor="middle">and runtime state are co-located.</text>

  <rect x="265" y="205" width="365" height="500" rx="16" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
  <text class="boundary-title" x="447.5" y="238" text-anchor="middle">Octant product boundary</text>
  <text class="boundary-note" x="447.5" y="260" text-anchor="middle">User-facing app and API that drive guided workflows.</text>

  <rect x="310" y="305" width="275" height="135" rx="12" fill="#0b7285" stroke="#0f172a" stroke-width="1.3" filter="url(#shadow)"/>
  <text class="label" x="447.5" y="337" text-anchor="middle">Octant UI</text>
  <text class="small" x="447.5" y="368" text-anchor="middle">Guided console for install,</text>
  <text class="small" x="447.5" y="386" text-anchor="middle">connections, validation,</text>
  <text class="small" x="447.5" y="404" text-anchor="middle">Clarity, sampling, and cost.</text>

  <rect x="310" y="520" width="275" height="145" rx="12" fill="#0b7285" stroke="#0f172a" stroke-width="1.3" filter="url(#shadow)"/>
  <text class="label" x="447.5" y="552" text-anchor="middle">Octant API</text>
  <text class="small" x="447.5" y="583" text-anchor="middle">Connect RPC services for</text>
  <text class="small" x="447.5" y="601" text-anchor="middle">installation, integrations,</text>
  <text class="small" x="447.5" y="619" text-anchor="middle">connections, settings,</text>
  <text class="small" x="447.5" y="637" text-anchor="middle">budgets, filters, and timeframes.</text>

  <rect x="705" y="205" width="390" height="500" rx="16" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text class="boundary-title" x="900" y="238" text-anchor="middle">SmartHub platform boundary</text>
  <text class="boundary-note" x="900" y="260" text-anchor="middle">Telemetry runtime capabilities configured through Octant.</text>

  <rect x="740" y="305" width="320" height="88" rx="12" fill="#2f9e44" stroke="#0f172a" stroke-width="1.3" filter="url(#shadow)"/>
  <text class="label" x="900" y="335" text-anchor="middle">SmartHub control plane</text>
  <text class="small" x="900" y="363" text-anchor="middle">Connection resources, chart install,</text>
  <text class="small" x="900" y="381" text-anchor="middle">runtime settings, and manifests.</text>

  <rect x="740" y="420" width="320" height="88" rx="12" fill="#2f9e44" stroke="#0f172a" stroke-width="1.3" filter="url(#shadow)"/>
  <text class="label" x="900" y="450" text-anchor="middle">Collectors and routing</text>
  <text class="small" x="900" y="478" text-anchor="middle">Receive logs, metrics, and traces,</text>
  <text class="small" x="900" y="496" text-anchor="middle">then route them to destinations.</text>

  <rect x="740" y="535" width="320" height="88" rx="12" fill="#2f9e44" stroke="#0f172a" stroke-width="1.3" filter="url(#shadow)"/>
  <text class="label" x="900" y="565" text-anchor="middle">Validation and insight stores</text>
  <text class="small" x="900" y="593" text-anchor="middle">Data Fidelity Validation, health</text>
  <text class="small" x="900" y="611" text-anchor="middle">metrics, Clarity volume, and cost.</text>

  <rect x="65" y="300" width="130" height="190" rx="14" fill="#ffffff" stroke="#0b7285" stroke-width="2"/>
  <circle cx="130" cy="338" r="13" fill="#ffffff" stroke="#0b7285" stroke-width="3"/>
  <line x1="130" y1="351" x2="130" y2="395" stroke="#0b7285" stroke-width="3" stroke-linecap="round"/>
  <line x1="98" y1="372" x2="162" y2="372" stroke="#0b7285" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="395" x2="104" y2="425" stroke="#0b7285" stroke-width="3" stroke-linecap="round"/>
  <line x1="130" y1="395" x2="156" y2="425" stroke="#0b7285" stroke-width="3" stroke-linecap="round"/>
  <text class="dark-label" x="130" y="456" text-anchor="middle">Operator</text>
  <text class="dark-small" x="130" y="477" text-anchor="middle">Uses Octant</text>

  <rect x="1190" y="185" width="150" height="500" rx="16" fill="#fff7ed" stroke="#9a3412" stroke-width="2"/>
  <text class="boundary-title" x="1265" y="220" text-anchor="middle">External</text>
  <text class="boundary-title" x="1265" y="242" text-anchor="middle">systems</text>

  <rect x="1210" y="295" width="110" height="95" rx="10" fill="#854d0e" stroke="#0f172a" stroke-width="1.3" filter="url(#shadow)"/>
  <text class="label" x="1265" y="327" text-anchor="middle">Argo CD</text>
  <text class="small" x="1265" y="354" text-anchor="middle">Applies</text>
  <text class="small" x="1265" y="372" text-anchor="middle">desired state</text>

  <rect x="1210" y="520" width="110" height="95" rx="10" fill="#854d0e" stroke="#0f172a" stroke-width="1.3" filter="url(#shadow)"/>
  <text class="label" x="1265" y="552" text-anchor="middle">Datadog</text>
  <text class="small" x="1265" y="579" text-anchor="middle">Receives</text>
  <text class="small" x="1265" y="597" text-anchor="middle">telemetry</text>

  <path class="edge" d="M195,395 L300,372"/>
  <text class="edge-label" x="245" y="374" text-anchor="middle">uses UI</text>

  <path class="edge" d="M447.5,440 L447.5,510"/>
  <text class="edge-label" x="447.5" y="480" text-anchor="middle">calls</text>

  <path class="edge" d="M585,582 L655,582 L655,350 L730,350"/>
  <text class="edge-label" x="655" y="455" text-anchor="middle">installs and configures</text>

  <path class="edge" d="M585,620 L675,620 L675,464 L730,464"/>
  <text class="edge-label" x="675" y="532" text-anchor="middle">creates connections</text>

  <path class="edge" d="M1060,350 C1110,350 1150,342 1200,342"/>
  <text class="edge-label" x="1130" y="332" text-anchor="middle">syncs manifests</text>

  <path class="edge" d="M1060,464 C1130,480 1130,567 1200,567"/>
  <text class="edge-label" x="1138" y="514" text-anchor="middle">exports telemetry</text>

  <rect x="265" y="790" width="830" height="82" rx="12" class="muted-box"/>
  <text class="dark-label" x="290" y="819">How to read this diagram</text>
  <text class="dark-small" x="290" y="842">Octant owns the product experience and API surface. SmartHub owns telemetry execution.</text>
  <text class="dark-small" x="290" y="860">External systems apply manifests or receive telemetry.</text>
</svg>
