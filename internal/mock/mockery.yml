all: false
dir: '{{.SrcPackageName}}'
filename: 'mocks.go'
log-level: info
structname: '{{.Mock}}{{.InterfaceName}}'
pkgname: '{{.SrcPackageName}}mock'
recursive: false
include-auto-generated: true
template: testify
packages:
  github.com/mydecisive/octant/internal/integration:
    interfaces:
      Integration:
  github.com/mydecisive/octant/internal/setting:
    interfaces:
      Manager:
      ManagerBuilder:
  github.com/mydecisive/octant/internal/connection:
    interfaces:
      Connection:
  github.com/mydecisive/octant/internal/connection/manifest:
    interfaces:
      TemplateProvider:
      TemplateRenderer:
      Generator:
      Manager:
      Compressor:
  github.com/mydecisive/octant/internal/connection/manifest/data:
    interfaces:
      Mapper:
  github.com/mydecisive/octant/internal/metrics:
    interfaces:
      PromClientFactory:
      ConnectionStatus:
  github.com/prometheus/client_golang/api/prometheus/v1:
    interfaces:
      API:
  github.com/mydecisive/octant/internal/argocd:
    interfaces:
      APIClient:
  github.com/argoproj/argo-cd/v3/pkg/apiclient/application:
    interfaces:
      ApplicationServiceServer:
  github.com/mydecisive/octant/internal/wrapper:
    interfaces:
      HTTPClient:
  github.com/mydecisive/octant/internal/budget:
    interfaces:
      MetricDataProvider:
  github.com/mydecisive/octant/internal/budget/data:
    interfaces:
      VariableAccessor:
      MetricDataRetriever:
  github.com/mydecisive/octant/internal/budget/data/db:
    config:
      pkgname: 'budget{{.SrcPackageName}}mock'
    interfaces:
      DatabaseAccessBuilder:
  github.com/mydecisive/octant/internal/budget/filter:
    interfaces:
      SettingController:
  k8s.io/client-go/kubernetes:
    interfaces:
      Interface:
  k8s.io/client-go/kubernetes/typed/apps/v1:
    config:
      dir: 'kubernetes/apps{{.SrcPackageName}}'
      pkgname: 'kubeapps{{.SrcPackageName}}mock'
    interfaces:
      AppsV1Interface:
      DeploymentInterface:
