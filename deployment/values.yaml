serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: "octant"
  integrationSecretNames:
    - "mdai-datadog-integration"
    - "mdai-argocd-integration"

deployment:
  name: octant
  replicas: 1
  port: 5678
  tolerations: []
  nodeSelector: {}
  affinity: {}
  annotations: {}
  prometheusEndpoint: "http://kube-prometheus-stack-prometheus:9090"

image:
  repository: ghcr.io/mydecisive/octant
  # tag: latest

argo-cd:
  namespace: argocd

certManager:
  version: v1.19.1
  namespace: cert-manager

validator:
  version: 0.1.3

services:
  name: octant
  type: ClusterIP

clarity:
  default:
    logSamplingRatio: 100
    logIncludeErr: true
    traceSamplingRatio: 100
    traceIncludeErr: true
