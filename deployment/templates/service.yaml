apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.name }}
  namespace: {{ .Release.Namespace }}
spec:
  type: {{ .Values.services.type }}
  selector:
    app: {{ .Values.deployment.name }}
  ports:
  - name: octant
    port: {{ .Values.deployment.port }}
    protocol: TCP
    targetPort: {{ .Values.deployment.port }}
