apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "deployment.fullname" . }}-octant-manager-role
  labels:
  {{- include "deployment.labels" . | nindent 4 }}
rules:
- apiGroups:
  - octant.mydecisive.ai
  resources:
  - octantinstalllogs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
