          application/connect+json:
            schema:
              $ref: '#/components/schemas/octant.v1alpha.UpdateRequest'
          application/connect+proto:
            schema:
              $ref: '#/components/schemas/octant.v1alpha.UpdateRequest'
          application/grpc:
            schema:
