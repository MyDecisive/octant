components:
  schemas:
    base64:
      type: boolean
      title: base64
      description: Specifies if the message query param is base64 encoded, which may be required for binary data
    budget.v1alpha.Filter:
      type: object
      properties:
        type:
          title: type
          description: type contains the filter type.
          $ref: '#/components/schemas/budget.v1alpha.FilterType'
        pctSampled:
          type: integer
          title: pct_sampled
          description: pct_sampled contains the sampling percentage.
        includeErr:
          type: boolean
          title: include_err
          description: include_err indcates if errors should be included.
      title: Filter
      additionalProperties: false
    budget.v1alpha.FilterType:
      type: string
      title: FilterType
      enum:
        - FILTER_TYPE_UNSPECIFIED
        - FILTER_TYPE_LOG
        - FILTER_TYPE_TRACE
      description: FilterType represents the type of filters supported.
    budget.v1alpha.GetFilterRequest:
      type: object
      properties:
        type:
          title: type
          description: type contains the type of the filter to retrieve.
          $ref: '#/components/schemas/budget.v1alpha.FilterType'
        namespace:
          type: string
          title: namespace
          description: namespace is the kubernetes namespace to install into.
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of this connection and its resources in argo/k8s
      title: GetFilterRequest
      additionalProperties: false
    budget.v1alpha.GetFilterResponse:
      type: object
      properties:
        data:
          title: data
          $ref: '#/components/schemas/budget.v1alpha.Filter'
      title: GetFilterResponse
      additionalProperties: false
    budget.v1alpha.Log:
      type: object
      properties:
        name:
          type: string
          title: name
          description: name is the service name.
        sent:
          type: number
          title: sent
          format: double
          description: sent represents the amount of data send (in GB).
        pct:
          type: number
          title: pct
          format: float
          description: |-
            pct contains the percentage of total log cost (e.g., 1.2345%).
             Remember to round to the nearest two decimal places.
        cost:
          type: number
          title: cost
          format: double
          description: |-
            cost contains the total cost.
             Remember to round to the nearest two decimal places.
      title: Log
      additionalProperties: false
    budget.v1alpha.LogRequest:
      type: object
      properties:
        timeframe:
          title: timeframe
          description: timeframe tells the server timeframe of the data to retrieve.
          $ref: '#/components/schemas/budget.v1alpha.Timeframe'
        size:
          type: integer
          title: size
          description: size limits number of services to retrieve.
        pageToken:
          type: string
          title: page_token
          description: page_token (pagination) used to grab next page of data.
        search:
          type: string
          title: search
          description: search is used to filter the data so that only services with name containing the given search term will be returned.
        namespace:
          type: string
          title: namespace
          description: namespace is the kubernetes namespace to install into.
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of this connection and its resources in argo/k8s
      title: LogRequest
      additionalProperties: false
    budget.v1alpha.LogResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/budget.v1alpha.Log'
          title: data
        nextPageToken:
          type: string
          title: next_page_token
      title: LogResponse
      additionalProperties: false
    budget.v1alpha.Overall:
      type: object
      properties:
        cost:
          type: number
          title: cost
          format: double
          description: |-
            cost contains the total cost for log and trace.
             Remember to round to the nearest two decimal places.
        log:
          title: log
          description: log contains overall metric data for logs.
          $ref: '#/components/schemas/budget.v1alpha.Overall.Metric'
        trace:
          title: trace
          description: trace contains overall metric data for traces.
          $ref: '#/components/schemas/budget.v1alpha.Overall.Metric'
      title: Overall
      additionalProperties: false
    budget.v1alpha.Overall.Metric:
      type: object
      properties:
        received:
          type: number
          title: received
          format: double
          description: |-
            received represents the total amount of data recieved.
             For log, the unit is in GB; For trace, the unit is in mm Events.
        sent:
          type: number
          title: sent
          format: double
          description: |-
            sent represents the total amount of data send.
             For log, the unit is in GB; For trace, the unit is in mm Events.
        filtered:
          type: number
          title: filtered
          format: double
          description: |-
            filtered represents the difference between sent and recieved.
             For log, the unit is in GB; For trace, the unit is in mm Events.
        costRate:
          type: number
          title: cost_rate
          format: float
          description: |-
            cost_rate contains the per GB (for log) or the per mm Events (for traces) cost rate.
             Remember to round to the nearest two decimal places.
        pct:
          type: number
          title: pct
          format: float
          description: |-
            pct contains the percentage of total overall cost (e.g., 1.2345%).
             Remember to round to the nearest two decimal places.
        cost:
          type: number
          title: cost
          format: double
          description: |-
            cost contains the total cost.
             Remember to round to the nearest two decimal places.
      title: Metric
      additionalProperties: false
    budget.v1alpha.OverallRequest:
      type: object
      properties:
        timeframe:
          title: timeframe
          description: timeframe tells the server timeframe of the data to retrieve.
          $ref: '#/components/schemas/budget.v1alpha.Timeframe'
        namespace:
          type: string
          title: namespace
          description: namespace is the kubernetes namespace to install into.
      title: OverallRequest
      additionalProperties: false
    budget.v1alpha.OverallResponse:
      type: object
      properties:
        data:
          title: data
          $ref: '#/components/schemas/budget.v1alpha.Overall'
      title: OverallResponse
      additionalProperties: false
    budget.v1alpha.Span:
      type: object
      properties:
        name:
          type: string
          title: name
          description: name is the trace root span name.
        breadth:
          type: number
          title: breadth
          format: double
          description: breadth contains the span breadth.
        depth:
          type: number
          title: depth
          format: double
          description: depth contains the span depth.
        invocations:
          type: number
          title: invocations
          format: double
          description: invocations contains the number of invocations.
        cost:
          type: number
          title: cost
          format: double
          description: |-
            cost contains the total cost.
             Remember to round to the nearest two decimal places.
      title: Span
      additionalProperties: false
    budget.v1alpha.Timeframe:
      type: string
      title: Timeframe
      enum:
        - TIMEFRAME_UNSPECIFIED
        - TIMEFRAME_24HR
        - TIMEFRAME_MTD
        - TIMEFRAME_LM
      description: Timeframe represents possible timeframes.
    budget.v1alpha.TimeframeStatusRequest:
      type: object
      properties:
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of this connection and its resources in argo/k8s
        namespace:
          type: string
          title: namespace
          description: namespace is the kubernetes namespace to install into.
      title: TimeframeStatusRequest
      additionalProperties: false
    budget.v1alpha.TimeframeStatusResponse:
      type: object
      properties:
        statuses:
          type: array
          items:
            $ref: '#/components/schemas/budget.v1alpha.TimeframeStatusResponse.Status'
          title: statuses
          description: |-
            statuses contains status of each timeframe.
             Note: this array will not contain duplicate timeframes.
        trace:
          type: boolean
          title: trace
          description: |-
            trace will contain true if there are data for traces.
             Otherwise, this will contain false.
             Note: this containing true just means there are data,
             and it doesn't necessarily mean there will be data
             for the user's selected timeframe.
        log:
          type: boolean
          title: log
          description: |-
            log will contain true if there are data for logs.
             Otherwise, this will contain false.
             Note: this containing true just means there are data,
             and it doesn't necessarily mean there will be data
             for the user's selected timeframe.
      title: TimeframeStatusResponse
      additionalProperties: false
    budget.v1alpha.TimeframeStatusResponse.Code:
      type: string
      title: Code
      enum:
        - CODE_UNSPECIFIED
        - CODE_OK
        - CODE_NO_DATA
        - CODE_NOT_ENOUGH
      description: Code represents the status code of a given timeframe.
    budget.v1alpha.TimeframeStatusResponse.Status:
      type: object
      properties:
        timeframe:
          title: timeframe
          description: timeframe contains the timeframe.
          $ref: '#/components/schemas/budget.v1alpha.Timeframe'
        status:
          title: status
          description: status contains the status code of the timeframe.
          $ref: '#/components/schemas/budget.v1alpha.TimeframeStatusResponse.Code'
      title: Status
      additionalProperties: false
    budget.v1alpha.TraceRequest:
      type: object
      properties:
        timeframe:
          title: timeframe
          description: timeframe tells the server timeframe of the data to retrieve.
          $ref: '#/components/schemas/budget.v1alpha.Timeframe'
        size:
          type: integer
          title: size
          description: size limits number of trace root spans to retrieve.
        pageToken:
          type: string
          title: page_token
          description: page_token (pagination) used to grab next page of data.
        search:
          type: string
          title: search
          description: search is used to filter the data so that only trace root span with name containing the given search term will be returned.
        namespace:
          type: string
          title: namespace
          description: namespace is the kubernetes namespace to install into.
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of this connection and its resources in argo/k8s
      title: TraceRequest
      additionalProperties: false
    budget.v1alpha.TraceResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/budget.v1alpha.Span'
          title: data
        nextPageToken:
          type: string
          title: next_page_token
      title: TraceResponse
      additionalProperties: false
    budget.v1alpha.UpdateFilterRequest:
      type: object
      properties:
        data:
          title: data
          description: |-
            data contains the filter setting data to update.
             `type` indicates which filter type should be updated.
          $ref: '#/components/schemas/budget.v1alpha.Filter'
        namespace:
          type: string
          title: namespace
          description: namespace is the kubernetes namespace to install into.
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of this connection and its resources in argo/k8s
      title: UpdateFilterRequest
      additionalProperties: false
    budget.v1alpha.UpdateFilterResponse:
      type: object
      properties:
        status:
          title: status
          $ref: '#/components/schemas/budget.v1alpha.UpdateFilterResponse.Status'
      title: UpdateFilterResponse
      additionalProperties: false
    budget.v1alpha.UpdateFilterResponse.Status:
      type: string
      title: Status
      enum:
        - STATUS_UNSPECIFIED
        - STATUS_VALUE_UPDATED
        - STATUS_WAIT_PROPAGATION
        - STATUS_COMPLETED
    compression:
      title: compression
      enum:
        - identity
        - gzip
        - br
      description: Which compression algorithm to use for this request
    connect:
      title: connect
      enum:
        - v1
      description: Define the version of the Connect protocol
    connect-protocol-version:
      type: number
      title: Connect-Protocol-Version
      enum:
        - 1
      description: Define the version of the Connect protocol
      const: 1
    connect-timeout-header:
      type: number
      title: Connect-Timeout-Ms
      description: Define the timeout, in ms
    connect.error:
      type: object
      properties:
        code:
          type: string
          examples:
            - not_found
          enum:
            - canceled
            - unknown
            - invalid_argument
            - deadline_exceeded
            - not_found
            - already_exists
            - permission_denied
            - resource_exhausted
            - failed_precondition
            - aborted
            - out_of_range
            - unimplemented
            - internal
            - unavailable
            - data_loss
            - unauthenticated
          description: The status code, which should be an enum value of [google.rpc.Code][google.rpc.Code].
        message:
          type: string
          description: A developer-facing error message, which should be in English. Any user-facing error message should be localized and sent in the [google.rpc.Status.details][google.rpc.Status.details] field, or localized by the client.
        details:
          type: array
          items:
            $ref: '#/components/schemas/connect.error_details.Any'
          description: A list of messages that carry the error details. There is no limit on the number of messages.
      title: Connect Error
      additionalProperties: true
      description: 'Error type returned by Connect: https://connectrpc.com/docs/go/errors/#http-representation'
    connect.error_details.Any:
      type: object
      properties:
        type:
          type: string
          description: 'A URL that acts as a globally unique identifier for the type of the serialized message. For example: `type.googleapis.com/google.rpc.ErrorInfo`. This is used to determine the schema of the data in the `value` field and is the discriminator for the `debug` field.'
        value:
          type: string
          format: binary
          description: The Protobuf message, serialized as bytes and base64-encoded. The specific message type is identified by the `type` field.
        debug:
          oneOf:
            - type: object
              title: Any
              additionalProperties: true
              description: Detailed error information.
          discriminator:
            propertyName: type
          title: Debug
          description: Deserialized error detail payload. The 'type' field indicates the schema. This field is for easier debugging and should not be relied upon for application logic.
      additionalProperties: true
      description: Contains an arbitrary serialized message along with a @type that describes the type of the serialized message, with an additional debug field for ConnectRPC error details.
    encoding:
      title: encoding
      enum:
        - proto
        - json
      description: Define which encoding or 'Message-Codec' to use
    google.protobuf.Empty:
      type: object
      description: |-
        A generic empty message that you can re-use to avoid defining duplicated
         empty messages in your APIs. A typical example is to use it as the request
         or the response type of an API method. For instance:

             service Foo {
               rpc Bar(google.protobuf.Empty) returns (google.protobuf.Empty);
             }
    octant.v1alpha.ConnectionData:
      type: object
      properties:
        scope:
          title: scope
          $ref: '#/components/schemas/octant.v1alpha.ConnectionScope'
        telemetryTypes:
          type: array
          items:
            $ref: '#/components/schemas/octant.v1alpha.MLTType'
          title: telemetry_types
          description: telemetry_types is used to generate the manifests.
        deployment:
          title: deployment
          description: deployment contains information required for deploying the connection
          $ref: '#/components/schemas/octant.v1alpha.Deployment'
        destinations:
          type: array
          items:
            $ref: '#/components/schemas/octant.v1alpha.TelemetryDestination'
          title: destinations
          description: destinations are where telemetry from this connection is sent and options needed to send it there
      title: ConnectionData
      additionalProperties: false
    octant.v1alpha.ConnectionScope:
      type: object
      properties:
        namespace:
          type: string
          title: namespace
          description: namespace that the connection is installed in/will be installed into
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of the connection
      title: ConnectionScope
      additionalProperties: false
      description: ConnectionScope contains identifiers for a connection
    octant.v1alpha.CreateConnectionRequest:
      type: object
      properties:
        connectionData:
          title: connection_data
          $ref: '#/components/schemas/octant.v1alpha.ConnectionData'
      title: CreateConnectionRequest
      additionalProperties: false
      description: CreateConnectionRequest contains options for creating a connection
    octant.v1alpha.CreateConnectionValidatorRunRequest:
      type: object
      properties:
        scope:
          title: scope
          $ref: '#/components/schemas/octant.v1alpha.ConnectionScope'
      title: CreateConnectionValidatorRunRequest
      additionalProperties: false
      description: CreateConnectionValidatorRunRequest has options for creating a connection validator
    octant.v1alpha.CreateConnectionValidatorRunResponse:
      type: object
      properties:
        validatorRunId:
          type: string
          title: validator_run_id
          description: validator_run_id is the created validator_run_id for the new validator run
      title: CreateConnectionValidatorRunResponse
      additionalProperties: false
      description: CreateConnectionValidatorRunResponse contains a response for validator creation
    octant.v1alpha.DeleteConnectionRequest:
      type: object
      properties:
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of the connection to delete
      title: DeleteConnectionRequest
      additionalProperties: false
    octant.v1alpha.DeleteConnectionValidatorRequest:
      type: object
      properties:
        scope:
          title: scope
          $ref: '#/components/schemas/octant.v1alpha.ConnectionScope'
      title: DeleteConnectionValidatorRequest
      additionalProperties: false
      description: DeleteConnectionValidatorRequest contains options for deleting a connection validator
    octant.v1alpha.Deployment:
      type: object
      properties:
        type:
          title: type
          description: type indicates what type of deployment mechanism/system to use
          $ref: '#/components/schemas/octant.v1alpha.DeploymentType'
        integrationName:
          type: string
          title: integration_name
          description: integration_name is the name of the previously created deployment integration to use
      title: Deployment
      additionalProperties: false
      description: Deployment is information needed to deploy a connection
    octant.v1alpha.DeploymentType:
      type: string
      title: DeploymentType
      enum:
        - DEPLOYMENT_TYPE_UNSPECIFIED
        - DEPLOYMENT_TYPE_ARGO_SIDELOAD
        - DEPLOYMENT_TYPE_ARGO_MANIFEST
    octant.v1alpha.GenerateManifestsRequest:
      type: object
      properties:
        scope:
          title: scope
          $ref: '#/components/schemas/octant.v1alpha.ConnectionScope'
        format:
          title: format
          description: format contains output format of the manifests.
          $ref: '#/components/schemas/octant.v1alpha.ManifestOutFormat'
        deploymentType:
          title: deployment_type
          description: deployment_type use to tell the type of manifest to generate.
          $ref: '#/components/schemas/octant.v1alpha.DeploymentType'
        telemetryTypes:
          type: array
          items:
            $ref: '#/components/schemas/octant.v1alpha.MLTType'
          title: telemetry_types
          description: telemetry_types is used to generate the manifests.
        mdaiVersion:
          type: string
          title: mdai_version
          description: mdai_version is the mdai hub version to use for app install.
      title: GenerateManifestsRequest
      additionalProperties: false
    octant.v1alpha.GenerateManifestsResponse:
      type: object
      properties:
        data:
          type: string
          title: data
          format: byte
          description: data contains a chunk of the file content as raw bytes.
        total:
          type:
            - integer
            - string
          title: total
          format: int64
          description: total is the total number of bytes for current file.
        type:
          type: string
          title: type
          description: type is the MIME type of the file. (e.g., zip)
      title: GenerateManifestsResponse
      additionalProperties: false
    octant.v1alpha.GetArgoIntegrationByNameRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: name contains name of the integration to retrieve
      title: GetArgoIntegrationByNameRequest
      additionalProperties: false
    octant.v1alpha.GetArgoIntegrationByNameResponse:
      type: object
      properties:
        argoEndpoint:
          type: string
          title: argo_endpoint
          description: argo_endpoint is the endpoint to the argo cd cluster to communicate with.
      title: GetArgoIntegrationByNameResponse
      additionalProperties: false
    octant.v1alpha.GetArgoIntegrationsResponse:
      type: object
      properties:
        names:
          type: array
          items:
            type: string
          title: names
          description: names contains the list of integration names
      title: GetArgoIntegrationsResponse
      additionalProperties: false
    octant.v1alpha.GetConnectionRequest:
      type: object
      properties:
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of the connection
      title: GetConnectionRequest
      additionalProperties: false
      description: GetConnectionRequest are fields required to fetch a connection
    octant.v1alpha.GetConnectionResponse:
      type: object
      properties:
        connectionData:
          title: connection_data
          $ref: '#/components/schemas/octant.v1alpha.ConnectionData'
      title: GetConnectionResponse
      additionalProperties: false
      description: GetConnectionResponse has details on a connection
    octant.v1alpha.GetConnectionStatusRequest:
      type: object
      properties:
        scope:
          title: scope
          $ref: '#/components/schemas/octant.v1alpha.ConnectionScope'
        validatorRunId:
          type: string
          title: validator_run_id
          description: validator_run_id is the Validator Run ID to get validation metrics for. Omitting this will yield empty/false validation results in the response.
      title: GetConnectionStatusRequest
      additionalProperties: false
      description: GetConnectionStatusRequest contains options for getting a connections validator run results
    octant.v1alpha.GetConnectionStatusResponse:
      type: object
      properties:
        receivingData:
          type: boolean
          title: receiving_data
          description: receiving_data indicates if the Connection's Collector is receiving telemetry for its configured Telemetry types
        sendingData:
          type: boolean
          title: sending_data
          description: sending_data indicates if the Connection's Collector is sending telemetry for its configured Telemetry types
        dataIntegrity:
          type: boolean
          title: data_integrity
          description: sending_data indicates if the data coming to the Collector fulfills validator parity or policy requirements
        clientsConnected:
          type: boolean
          title: clients_connected
          description: clients_connected indicates if the Connection's Collector is connected for its configured Telemetry types
        validationResults:
          title: validation_results
          description: validation_results is a map of granular validation details per data type (MLT)
          $ref: '#/components/schemas/octant.v1alpha.ValidationResultsBySignal'
      title: GetConnectionStatusResponse
      additionalProperties: false
    octant.v1alpha.GetConnectionValidatorRunIdsRequest:
      type: object
      properties:
        scope:
          title: scope
          $ref: '#/components/schemas/octant.v1alpha.ConnectionScope'
      title: GetConnectionValidatorRunIdsRequest
      additionalProperties: false
      description: GetConnectionValidatorRunIdsRequest is a request to get all available connection validator runs
    octant.v1alpha.GetConnectionValidatorRunIdsResponse:
      type: object
      properties:
        validatorRunIds:
          type: array
          items:
            type: string
          title: validator_run_ids
          description: validator_run_ids is the list of validator_run_ids currently available in the metrics set
      title: GetConnectionValidatorRunIdsResponse
      additionalProperties: false
      description: GetConnectionValidatorRunIdsResponse provides all the validator run ids for a connection
    octant.v1alpha.GetConnectionsResponse:
      type: object
      properties:
        connectionNames:
          type: array
          items:
            type: string
          title: connection_names
          description: connection_names are the connection names found in the namespace
      title: GetConnectionsResponse
      additionalProperties: false
      description: GetConnectionsResponse contains a list of all the connections in a namespace
    octant.v1alpha.GetDatadogIntegrationByNameRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: name contains name of the integration to retrieve
      title: GetDatadogIntegrationByNameRequest
      additionalProperties: false
    octant.v1alpha.GetDatadogIntegrationByNameResponse:
      type: object
      properties:
        url:
          type: string
          title: url
          description: url is the datadog api url to send telemetry data to.
      title: GetDatadogIntegrationByNameResponse
      additionalProperties: false
    octant.v1alpha.GetDatadogIntegrationsResponse:
      type: object
      properties:
        names:
          type: array
          items:
            type: string
          title: names
          description: names contains the list of integration names
      title: GetDatadogIntegrationsResponse
      additionalProperties: false
    octant.v1alpha.GetInstallStatusRequest:
      type: object
      properties:
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the name of the octant connection to check install status for.
      title: GetInstallStatusRequest
      additionalProperties: false
    octant.v1alpha.GetInstallStatusResponse:
      type: object
      properties:
        installStatus:
          title: install_status
          description: install_status is the status of the installation.
          $ref: '#/components/schemas/octant.v1alpha.InstallStatus'
        details:
          type: array
          items:
            $ref: '#/components/schemas/octant.v1alpha.ResourceDetails'
          title: details
          description: details will contain any necessary details for states that have extra information.
      title: GetInstallStatusResponse
      additionalProperties: false
    octant.v1alpha.InstallMDAIHubRequest:
      type: object
      properties:
        namespace:
          type: string
          title: namespace
          description: namespace is the kubernetes namespace to install into.
        connectionName:
          type: string
          title: connection_name
          description: connection_name is the named octant connection configuration to use for install.
        mdaiVersion:
          type: string
          title: mdai_version
          description: mdai_version is the mdai hub version to use for install.
      title: InstallMDAIHubRequest
      additionalProperties: false
    octant.v1alpha.InstallStatus:
      type: string
      title: InstallStatus
      enum:
        - INSTALL_STATUS_UNSPECIFIED
        - INSTALL_STATUS_INSTALLING
        - INSTALL_STATUS_ERROR
        - INSTALL_STATUS_INSTALLED
        - INSTALL_STATUS_TIMEOUT
    octant.v1alpha.IntegrationType:
      type: string
      title: IntegrationType
      enum:
        - INTEGRATION_TYPE_UNSPECIFIED
        - INTEGRATION_TYPE_DATADOG
      description: IntegrationType is the type of integration for destinations or deployments
    octant.v1alpha.MLTType:
      type: string
      title: MLTType
      enum:
        - MLT_TYPE_UNSPECIFIED
        - MLT_TYPE_METRIC
        - MLT_TYPE_TRACE
        - MLT_TYPE_LOG
    octant.v1alpha.ManifestOutFormat:
      type: string
      title: ManifestOutFormat
      enum:
        - MANIFEST_OUT_FORMAT_UNSPECIFIED
        - MANIFEST_OUT_FORMAT_JSON
        - MANIFEST_OUT_FORMAT_YAML
    octant.v1alpha.ResourceDetails:
      type: object
      properties:
        name:
          type: string
          title: name
          description: name is the name of the resource (pod name, etc.)
        message:
          type: string
          title: message
          description: message describes the state of the resource.
      title: ResourceDetails
      additionalProperties: false
    octant.v1alpha.SaveArgoConnectionRequest:
      type: object
      properties:
        argoEndpoint:
          type: string
          title: argo_endpoint
          description: argo_endpoint is the endpoint to the argo cd cluster to communicate with.
        argoAccountToken:
          type: string
          title: argo_account_token
          description: argo_account_token is the generated token for the account to use for communicating with the argo cd API.
        name:
          type: string
          title: name
          description: name contains name of the argocd integration to save
      title: SaveArgoConnectionRequest
      additionalProperties: false
    octant.v1alpha.SaveDatadogIntegrationRequest:
      type: object
      properties:
        name:
          type: string
          title: name
          description: name contains name of the datadog integration to save
        apiKey:
          type: string
          title: api_key
          description: api_key is the 32-character api key generated from datadog.
        url:
          type: string
          title: url
          description: url is the datadog api url to send telemetry data to.
      title: SaveDatadogIntegrationRequest
      additionalProperties: false
    octant.v1alpha.TelemetryDestination:
      type: object
      properties:
        type:
          title: type
          description: type is the integration type for this integration
          $ref: '#/components/schemas/octant.v1alpha.IntegrationType'
        integrationName:
          type: string
          title: integration_name
          description: integration_name is the name of a previously created integration with information needed to send telemetry
      title: TelemetryDestination
      additionalProperties: false
      description: TelemetryDestination is information for an integration to send telemetry to from a connection
    octant.v1alpha.TestConnectionRequest:
      type: object
      properties:
        argoEndpoint:
          type: string
          title: argo_endpoint
          description: argo_endpoint is the endpoint to the argo cd cluster to communicate with.
        argoAccountToken:
          type: string
          title: argo_account_token
          description: argo_account_token is the generated token for the account to use for communicating with the argo cd API.
      title: TestConnectionRequest
      additionalProperties: false
    octant.v1alpha.TestConnectionResponse:
      type: object
      properties:
        success:
          type: boolean
          title: success
          description: success indicates whether the operation was succesful or not.
      title: TestConnectionResponse
      additionalProperties: false
    octant.v1alpha.UpdateRequest:
      type: object
      properties:
        scope:
          title: scope
          description: scope indicates which connection to modify.
          $ref: '#/components/schemas/octant.v1alpha.ConnectionScope'
        telemetryTypes:
          type: array
          items:
            $ref: '#/components/schemas/octant.v1alpha.MLTType'
          title: telemetry_types
          description: |-
            telemetry_types contains the new telemetry types to enable for the given connection.
             If telemetry_types is empty, the connection's current telemetry_types will not be modified.
             If telemetry_types is not empty, the octant connection cofigmap will be updated with the new telemetry_types,
             lb collector will be updated to include relevant pipelines, and relevant sampling collectors will be spinned up/down.
        datadogUrl:
          type: string
          title: datadog_url
          description: |-
            datadog_url contains the new datadog URL to be applied.
             If datadog_url is empty, existing URL will not be modified.
             If datadog_url is not empty, the datadog integration secret will be updated with the new URL,
             and the sampling collectors will be restarted to use the new data.
        datadogApiKey:
          type: string
          title: datadog_api_key
          description: |-
            datadog_api_key contains the new datadog API key to be applied.
             If datadog_api_key is empty, existing API key will not be modified.
             If datadog_api_key is not empty, the datadog integration secret will be updated with the new API key,
             and the sampling collectors will be restarted to use the new data.
      title: UpdateRequest
      additionalProperties: false
    octant.v1alpha.UpdateResponse:
      type: object
      properties:
        status:
          title: status
          description: |-
            status indicates current status of the update.
             For more details, see comments in Status enum.
          $ref: '#/components/schemas/octant.v1alpha.UpdateResponse.Status'
      title: UpdateResponse
      additionalProperties: false
    octant.v1alpha.UpdateResponse.Status:
      type: string
      title: Status
      enum:
        - STATUS_UNSPECIFIED
        - STATUS_UPDATING
        - STATUS_UPDATED
        - STATUS_DEPLOY
        - STATUS_WAIT
        - STATUS_COMPLETED
        - STATUS_TIMEOUT
    octant.v1alpha.ValidationAttributes:
      type: object
      properties:
        parity:
          type: object
          title: parity
          additionalProperties:
            type: boolean
            title: value
          description: parity indicates if the ingress attribute matches the attribute on egress
        policy:
          type: object
          title: policy
          additionalProperties:
            type: boolean
            title: value
          description: parity indicates if the attribute fulfills the MDAI validator policy for this attribute
      title: ValidationAttributes
      additionalProperties: false
    octant.v1alpha.ValidationAttributes.ParityEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: boolean
          title: value
      title: ParityEntry
      additionalProperties: false
    octant.v1alpha.ValidationAttributes.PolicyEntry:
      type: object
      properties:
        key:
          type: string
          title: key
        value:
          type: boolean
          title: value
      title: PolicyEntry
      additionalProperties: false
    octant.v1alpha.ValidationResult:
      type: object
      properties:
        parity:
          type: boolean
          title: parity
          description: parity indicates if the ingress telemetry payloads match the egress telemetry payloads
        policy:
          type: boolean
          title: policy
          description: parity indicates if the egress telemetry payloads fulfill the MDAI validator policy
        attributes:
          title: attributes
          description: attributes is a map of attributes to per-attribute parity/policy checks
          $ref: '#/components/schemas/octant.v1alpha.ValidationAttributes'
      title: ValidationResult
      additionalProperties: false
    octant.v1alpha.ValidationResultsBySignal:
      type: object
      properties:
        logs:
          title: logs
          $ref: '#/components/schemas/octant.v1alpha.ValidationResult'
        metrics:
          title: metrics
          $ref: '#/components/schemas/octant.v1alpha.ValidationResult'
        traces:
          title: traces
          $ref: '#/components/schemas/octant.v1alpha.ValidationResult'
      title: ValidationResultsBySignal
      additionalProperties: false
security: []
tags:
  - name: BudgetService
  - name: FilterService
  - name: TimeframeService
  - name: ArgoCDService
